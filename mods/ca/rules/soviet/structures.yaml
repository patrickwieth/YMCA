Soviet_Refinery:
	Inherits: PROC
	Buildable:
		Prerequisites: anypower, ~structures.soviet
	FreeActor:
		Actor: Soviet_Miner
		SpawnOffset: 1,2
		Facing: 64
		RequiresCondition: spawn-harv && !spawn-charv && !build-incomplete
	ProvidesPrerequisite@ra:
		Prerequisite: proc

Cloning_Vats:
	Inherits: ^BuildingTD
	Inherits@IDISABLE: ^DisableOnLowPowerOrPowerDownOrForceDisable
	Inherits@shape: ^2x2Shape
	HitShape:
		UseTargetableCellsOffsets: false
		TargetableOffsets: 0,0,0, 640,-384,0, 640,512,0, -710,-512,0, -710,512,0
	Buildable:
		Queue: Building
		IconPalette: chrometd
		BuildPaletteOrder: 200
		BuildLimit: 1
		Prerequisites: tier3, ~structures.iraq
		Description: Clones produced infantry.
	Valued:
		Cost: 2500
	Tooltip:
		Name: Cloning Vats
	Building:
		Footprint: xx xx ==
		Dimensions: 2,3
		LocalCenterOffset: 0,-512,0
	Health:
		HP: 50000
	RevealsShroud:
		Range: 4c0
	WithBuildingBib:
	Power:
		Amount: -100
		RequiresCondition: !being-warped
	Targetable:
		TargetTypes: Ground, Structure, C4, DetonateAttack
	WithDeathAnimation:
		DeathSequence: dead
		UseDeathTypeSuffix: false
	Production:
		Produces: Clone.Soviets
	ClonesProducedUnits:
		CloneableTypes: Infantry
		ProductionType: Clone.Soviets
		RequiresCondition: !being-warped && !disabled && !empdisable
	Exit:
		SpawnOffset: -725,640,0
		ExitCell: 0,2
	Exit@2:
		ExitCell: 1, 0
	RallyPoint:
		Path: 3,3

FTUR:
	Inherits: ^Defense
	Inherits: ^1x1Building+Minibib
	Inherits: ^AutoTargetGround
	Buildable:
		Queue: Defense
		BuildPaletteOrder: 60
		Prerequisites: barr, ~!structures.iraq, ~structures.soviet
		Description: Anti-infantry base defense.\n  Can detect cloaked units.\n  Strong vs Infantry, Light Armor\n  Weak vs Tanks, Aircraft
	Valued:
		Cost: 600
	Tooltip:
		Name: Flame Tower
	Building:
	Health:
		HP: 40000
	RevealsShroud:
		MinRange: 5c0
		Range: 6c0
		RevealGeneratedShroud: False
	RevealsShroud@GAPGEN:
		Range: 5c0
	Turreted:
		TurnSpeed: 1000
		Offset: 0,0,112
	Armament:
		Weapon: FireballLauncher
		LocalOffset: 512,0,0
	AttackTurreted:
		PauseOnCondition: empdisable || being-warped
		RequiresCondition: !build-incomplete
	-QuantizeFacingsFromSequence:
	BodyOrientation:
		QuantizedFacings: 8
	Power:
		Amount: -20
		RequiresCondition: !being-warped
	ProvidesPrerequisite@buildingname:
	FireWarheadsOnDeathCA:
		Weapon: BuildingExplode
		EmptyWeapon: BuildingExplode

