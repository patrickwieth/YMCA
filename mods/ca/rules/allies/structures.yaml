Grand_Cannon:
	Inherits: ^Defense
	Inherits: ^HighResShadow
	Inherits: ^AutoTargetGround
	Inherits: ^DisableOnLowPowerOrPowerDown
	Inherits: ^2x2Shape
	Buildable:
		Queue: Defense
		BuildPaletteOrder: 100
		Prerequisites: radar, ~structures.france
		Description: Artillery base defense.\n  Requires power to operate.\n  Can detect cloaked units.\n  Strong vs Ground Units\n  Weak vs Aircraft
	Valued:
		Cost: 1650
	Tooltip:
		Name: Grand Cannon
	Building:
		Footprint: xx xx
		Dimensions: 2,2
	Health:
		HP: 100000
	RevealsShroud:
		MinRange: 6c0
		Range: 8c0
		RevealGeneratedShroud: False
	RevealsShroud@GAPGEN:
		Range: 6c0
	Turreted:
		TurnSpeed: 8
		InitialFacing: 0
		RealignDelay: -1
	-WithSpriteBody:
	WithEmbeddedTurretSpriteBody:
		PauseOnCondition: disabled || empdisable || being-warped
	AttackTurreted:
		PauseOnCondition: disabled || empdisable || being-warped
	WithAttackAnimation:
		Sequence: shoot
	Armament:
		Weapon: 203mm
		FireDelay: 2
		MuzzleSequence: muzzle
		LocalOffset: 2100,0,80
	WithMuzzleOverlay:
	Power:
		Amount: -100
		RequiresCondition: !being-warped
	BodyOrientation:
		UseClassicFacings: True
	FireWarheadsOnDeathCA:
		Weapon: BuildingExplode
		EmptyWeapon: BuildingExplode
	WithBuildingBib:
		HasMinibib: true
	DetectCloaked:
		RequiresCondition: !(disabled || empdisable || being-warped)

PRIS:
	Inherits: ^Defense
	Inherits: ^DisableOnLowPowerOrPowerDown
	Inherits: ^AutoTargetGround
	AutoTargetPriority@DEFAULT:
		InvalidTargets: NoAutoTarget, WaterStructure, PrismTower
	AutoTargetPriority@ATTACKANYTHING:
		InvalidTargets: NoAutoTarget, PrismTower
	AutoTargetPriority@PRISMNORMAL:
		RequiresCondition: !assault-move && !attack-move
		ValidTargets: PrismTower
	Buildable:
		Queue: Defense
		BuildPaletteOrder: 90
		Prerequisites: radar, ~structures.allies
		Description: Experimental base defense.\nRequires power to operate.\nCan detect cloaked units.\n  Strong vs Vehicles, Infantry\n  Weak vs Aircraft
	Valued:
		Cost: 1300
	Tooltip:
		Name: Prism Tower
	Building:
	Health:
		HP: 35000
	RevealsShroud:
		MinRange: 6c0
		Range: 8c0
		RevealGeneratedShroud: False
	RevealsShroud@GAPGEN:
		Range: 6c0
	Power:
		Amount: -75
		RequiresCondition: !being-warped
	ProvidesPrerequisite@buildingname:
	WithBuildingBib:
		Sequence: bibFtur
		HasMinibib: true
	WithSpriteBody@charged:
		PauseOnCondition: disabled || empdisable || being-warped
		RequiresCondition: !charging
	WithSpriteBody@charging:
		Sequence: active
		Name: bodyactive
		RequiresCondition: charging
	GrantCondition@charging:
		Condition: charging
		RequiresCondition: !fired && !ammo
	AmbientSound:
		RequiresCondition: charging
		SoundFiles: bpripow.aud
		Interval: 30, 40
	AttackTurreted:
		RequiresCondition: !build-incomplete
		Armaments: primary, secondary, tertiary
		PauseOnCondition: disabled || empdisable || being-warped
	Turreted:
		TurnSpeed: 1000
		Offset: 0,0,112
	Targetable@PrismTower:
		TargetTypes: PrismTower
	Targetable@PrismTowerChargeable:
		TargetTypes: PrismTowerChargeable
		RequiresCondition: !ammo
	Armament@primary:
		Weapon: PrisLaser
		LocalOffset: 0,0,996
		Name: primary
		PauseOnCondition: !ammo && !powercharged
	GrantConditionOnAttack@primary:
		ArmamentNames: primary
		Condition: fired
		MaximumInstances: 1
		RevokeDelay: 40
	Armament@secondary:
		Weapon: PrisLaserCharge
		LocalOffset: 0,0,986
		Name: secondary
		TargetRelationships: Ally
		ForceTargetRelationships: Ally
		PauseOnCondition: fired && !powercharged
		RequiresCondition: ammo
	GrantConditionOnAttack@secondary:
		ArmamentNames: secondary
		Condition: fired
		MaximumInstances: 1
		RevokeDelay: 40
	ExternalCondition@POWERCHARGED:
		Condition: powercharged
	ProximityExternalCondition@aiming:
		Condition: aiming
		Range: 8c512
		RequiresCondition: aiming && !fired
	ExternalCondition@aiming:
		Condition: aiming
	GrantConditionWhileAiming:
		Condition: aiming
	AmmoPool:
		Name: primary
		Ammo: 5
		InitialAmmo: 1
		Armaments: primary, secondary
		AmmoCondition: ammo
	ReloadAmmoPoolCA@autocharge:
		Delay: 25
		Count: 1
		ResetOnFire: False
		RequiresCondition: ammo < 1 && !fired
		ShowSelectionBar: false
		SelectionBarColor: 0000ff
	ReloadAmmoPoolCA@discharge:
		Delay: 15
		Count: -1
		ResetOnFire: False
		RequiresCondition: ammo > 1
		ShowSelectionBar: false
		SelectionBarColor: ff0000
	ReloadAmmoPoolCA@powercharge:
		AmmoPool: primary
		Delay: 1
		Count: 1
		RequiresCondition: powercharged
		ShowSelectionBar: false
		SelectionBarColor: 00ff00
	WithAmmoPipsDecoration:
		Position: BottomLeft
		RequiresSelection: true
		FullSequence: pip-red

GAP:
	Inherits: ^ScienceBuilding
	Inherits: ^1x1Building+Minibib
	Inherits: ^DisableOnLowPowerOrPowerDownOrForceDisable
	Valued:
		Cost: 800
	Tooltip:
		Name: Gap Generator
	Buildable:
		Queue: Defense
		BuildPaletteOrder: 110
		Prerequisites: atek, ~structures.allies
		Description: Obscures the enemy's view with shroud.\n  Requires power to operate.
	WithSpriteBody:
		PauseOnCondition: disabled || empdisable || being-warped
	Health:
		HP: 50000
	RevealsShroud:
		MinRange: 4c0
		Range: 5c0
		RevealGeneratedShroud: False
	RevealsShroud@GAPGEN:
		Range: 4c0
	CreatesShroud:
		Range: 5c0
		RequiresCondition: !disabled && !empdisable && !being-warped
	RenderShroudCircle:
	Power:
		Amount: -60
	MustBeDestroyed:
		RequiredForShortGame: false
	-AcceptsDeliveredCash:
	FireWarheadsOnDeathCA:
		Weapon: SmallBuildingExplode
		EmptyWeapon: SmallBuildingExplode
	HitShape:
		Type: Rectangle
			TopLeft: -512, -512
			BottomRight: 512, 512

PROC:
	Inherits: ^Building
	Inherits: ^BotIncome
	Inherits: ^3x3Building+Bib
	Inherits: ^Refinery
	Building:
		Footprint: _X_ xxx X++ +++
	Buildable:
		Queue: Building
		BuildPaletteOrder: 60
		Prerequisites: anypower, ~structures.allies
		Description: Processes raw Tiberium, Ore and Gems\ninto credits.
	Valued:
		Cost: 2000
	Tooltip:
		Name: Ore Refinery
	Targetable:
		TargetTypes: Ground, Structure, C4, DetonateAttack, ThiefInfiltrate
	Health:
		HP: 90000
	RevealsShroud:
		MinRange: 4c0
		Range: 5c0
		RevealGeneratedShroud: False
	RevealsShroud@GAPGEN:
		Range: 4c0
	DrawLineToTarget:
	GrantConditionOnPrerequisite@OREP:
		Prerequisites: orep
		Condition: orep-built
	GrantConditionOnPrerequisite@NOOREP:
		Prerequisites: !orep
		Condition: orep-notbuilt
	GrantCondition@SPAWNHARV:
		Condition: spawn-harv
		GrantPermanently: true
		RequiresCondition: orep-notbuilt
	GrantCondition@SPAWNCHARV:
		Condition: spawn-charv
		GrantPermanently: true
		RequiresCondition: orep-built
	FreeActor:
		Actor: HARV
		SpawnOffset: 1,2
		Facing: 64
		RequiresCondition: spawn-harv && !spawn-charv && !build-incomplete
	FreeActor@CHARV:
		Actor: HARV.Chrono
		SpawnOffset: 1,2
		Facing: 64
		RequiresCondition: spawn-charv && !spawn-harv && !build-incomplete
	WithIdleOverlay@TOP:
		RequiresCondition: !build-incomplete
		Sequence: idle-top
	Power:
		Amount: -30
		RequiresCondition: !being-warped
	WithDeathAnimation:
		DeathSequence: dead
		UseDeathTypeSuffix: false
	ProvidesPrerequisite@buildingname:
	HitShape:
		Type: Rectangle
			TopLeft: -1536, -512
			BottomRight: 1536, 598
	HitShape@TOP:
		TargetableOffsets: 1680,0,0
		Type: Rectangle
			TopLeft: -512, -1536
			BottomRight: 512, -512
	HitShape@BOTTOMLEFT:
		TargetableOffsets: -1260,-1024,0
		Type: Rectangle
			TopLeft: -1536, 598
			BottomRight: -512, 1280
	-ActorPreviewPlaceBuildingPreview:
	SequencePlaceBuildingPreview:
		Sequence: idle
	SpawnActorsOnSell:
		ActorTypes: light_infantry,light_infantry,light_infantry,light_infantry,light_infantry,light_infantry,light_infantry,light_infantry,light_infantry,light_infantry,c1,c1,c1,c1,c7,c7,c7,c7,c10,c10
	SpawnNeighboringActors@dockhelper1:
		ActorTypes: refinery.dockhelper
		Locations: 0,1
